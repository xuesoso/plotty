name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

# Least privilege: jobs only need to read the repo.
permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    # 22.04 still ships Python 3.7/3.8 via actions/setup-python (24.04 does not)
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + pytest
        run: |
          python -m pip install --upgrade pip
          pip install . pytest
      - name: Run tests
        run: pytest -q

  build:
    name: build + metadata check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Build sdist + wheel
        run: uv build
      - name: Validate package metadata
        run: uvx twine check dist/*

  audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Export runtime dependencies
        run: uv export --no-dev --no-emit-project --no-hashes -o requirements.txt
      - name: Audit dependencies for known vulnerabilities
        run: uvx pip-audit -r requirements.txt

  publish:
    name: publish to PyPI
    # only on a published GitHub Release, and only after tests + build pass
    if: github.event_name == 'release'
    needs: [test, build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write          # required for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (trusted publishing)
        run: uv publish --trusted-publishing always
