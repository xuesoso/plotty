name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: jobs only need to read the repo.
permissions:
  contents: read

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    # 22.04 still ships Python 3.7/3.8 via actions/setup-python (24.04 does not)
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.7", "3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + pytest
        run: |
          python -m pip install --upgrade pip
          pip install . pytest
      - name: Run tests
        run: pytest -q

  build:
    name: build + metadata check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
      - name: Build sdist + wheel
        run: uv build
      - name: Validate package metadata
        run: uvx twine check dist/*

  audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e  # v6
      - name: Export runtime dependencies
        run: uv export --no-dev --no-emit-project --no-hashes -o requirements.txt
      - name: Audit dependencies for known vulnerabilities
        run: uvx pip-audit -r requirements.txt
